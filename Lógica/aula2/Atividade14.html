<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade14</title>
</head>
<body>
    <h1>Atividade14</h1>

    <script>
        let soma = 0;

        for(let i = 0; i < 10; i++){
            let numero = parseInt(prompt("Digite um número inteiro:"));
            soma = soma + numero;
        }
        document.write("A soma dos números digitados é: " + soma);
    </script>
</body>
</html>

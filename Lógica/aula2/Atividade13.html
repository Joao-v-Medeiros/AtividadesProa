<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade13</title>
</head>
<body>
    <h1>Atividade13</h1>
    <script>
        let g = parseFloat(prompt("Digite a temperatura em graus Celsius:"));
        let f = (9*g+160)/5;
        alert(g + "°C equivalem a " + f.toFixed(2) + "°F.");
    </script>
</body>
</html>

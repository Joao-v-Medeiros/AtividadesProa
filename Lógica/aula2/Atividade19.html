    <script>
        let reais = parseFloat(prompt("Digite um valor em reais:"));

        let dolaresDisp = parseFloat(prompt("Digite a quantidade de dólares disponíveis:"));

        document.write("Valor em dólares: " + valorEmDolares.toFixed(2) + "<br>");
    </script>

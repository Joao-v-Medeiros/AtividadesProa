<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade22</title>
</head>
<body>
    <h1>Atividade22</h1>
    
    <script>
        let num = 0

        for(let i = 1; i <=20; i++){
            let numero = parseFloat(prompt("Digite um número"))
            if(numero >=0 && numero <=100){
                num++
            }
        }

        document.write("Quantidades de númeors que estão entre 0 a 100: " + num)

    </script>

</body>
</html>

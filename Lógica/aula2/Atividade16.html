<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade16</title>
</head>
<body>
    <h1>Atividade16</h1>
    <script>
        let soma = 0;
        for(let i = 0; i < 20; i++){
            let idade = parseInt(prompt("Digite a idade:"));
            soma = soma + idade;
        }

        document.write("A média das idades digitadas é: " + (soma / 20));
    </script>
</body>
</html>

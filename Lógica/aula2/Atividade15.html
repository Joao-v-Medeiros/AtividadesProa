<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=[device-width], initial-scale=1.0">
    <title>Atividade15</title>
</head>
<body>
    <h1>Atividade15</h1>
    <script>
        let soma = 0;
        for(let i = 0; i < 20; i++){
            let idade = parseInt(prompt("Digite a idade:"));
            soma = soma + idade;
        }

        document.write("A soma das idades digitadas é: " + soma);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade20</title>
</head>
<body>
    <h1>Atividade20</h1>
    
    <script>
        let count = 0

        for(let i = 0; i <=20; i++){
            let num = parseInt(prompt("Digite um número"))
            if(num >8){
            count++
            }
        }

        document.write("Números maiores que 8 é: " + count)

    </script>

</body>
</html>

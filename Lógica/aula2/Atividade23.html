<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade23</title>
</head>
<body>
    <h1>Atividade23</h1>
    
    <script>
        let soma0a100 = 0
        let soma101a200 = 0
        let maior200 = 0

        for(let i = 1; i <=5; i++){
            let numero = parseFloat(prompt("Digite um número"))
            if(numero >=0 && numero <=100){
                soma0a100++
            }else if (numero >=101 && numero <=200){
                soma101a200++
            } else{
                maior200++
            }
        }

        document.write("<br>Quantidades de númeors que estão entre 0 a 100: " + soma0a100)
        document.write("<br>Quantidades de númeors que estão entre 101 a 200: " + soma101a200)
        document.write("<br>Quantidades de númeors que estão acima de 200: " + maior200)

    </script>

</body>
</html>

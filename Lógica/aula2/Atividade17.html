<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Atividade17</h1>
    
    <script>
        let soma = 0

        for(let i = 0; i < 20; i++){
            let idade = parseInt(prompt("Digite a idade"))
            if( idade >18){
                soma++
            }

        }

        document.write("O número de pessoas com 18 ou mais é: " + soma)

    </script>

</body>
</html>

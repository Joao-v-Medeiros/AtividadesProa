<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade12</title>
</head>
<body>
    <h1>Atividade12</h1>
    <script>
        let soma = 0;

        for(let i = 0; i <= 15; i++){
            let soma = soma + i;
        }
        
        document.write("A soma dos números de 0 a 15 é: " + soma);
    </script>
</body>
</html>

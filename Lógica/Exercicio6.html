<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 6</title>

</head>
<body>
    <h1>Exercício 6</h1>

    <script>
        let num = parseFloat(prompt("Digite um número: "))
        
        document.write("Número escolhido: " + num)

        let antecessor = num -1

        let sucessor = num +1

        document.write("<br> O antecessor é: " + antecessor)
        document.write("<br> O sucessor é: " + sucessor)

    </script>

    
</body>
</html>

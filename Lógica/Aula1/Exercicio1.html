<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercícios 1</title>
</head>
<body>
 
    <script>
        let anos = parseFloat(prompt("Digite sua idade em anos:"));
        let meses = parseFloat(prompt("Digite sua idade em meses:"));
        let dias = parseFloat(prompt("Digite sua idade em dias:"));

       let totalDias = (anos * 365) + (meses * 30) + dias;

        document.write("Sua idade total em dias é: " + totalDias);
    </script>

</script> 
</body>
</html>

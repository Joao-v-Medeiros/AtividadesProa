<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício de logica</title>
</head>
<body>

    <h1>Crie um programa que leia o nome e a idade de várias pessoas usando o loop "do-while" até que o nome "fim" seja <br>
        informado. Ao final, exiba a média das idades.</h1>

    <script>

        let nome, soma = 0, cont = 0

        do{
        nome = prompt("Nome:")
        if (nome != "fim"){
        let idade = Number(prompt("Idade:"))
        soma += idade
        cont++
        }

        } while (nome != "fim")

        console.log(soma / cont)

    </script>
    
</body>
</html>

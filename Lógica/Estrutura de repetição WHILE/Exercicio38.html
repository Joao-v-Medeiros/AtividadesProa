<body>

    <h1>Escreva um programa que leia um número inteiro e exiba a sequência de Fibonacci até o número lido.</h1>

    <script>

        let limite = Number(prompt("Até:"))
        let a = 0, b = 1

       for (; a <= limite;){
       console.log(a)
       let temp = a + b
       a = b
       b = temp
       }

    </script>
    
</body>

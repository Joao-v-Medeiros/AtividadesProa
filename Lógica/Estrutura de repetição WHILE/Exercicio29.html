<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício de logica</title>
</head>
<body>

    <h1>Escreva um programa que calcule o fatorial de um número inteiro inserido pelo usuário usando o loop "do-while".</h1>

    <script>

        let n = Number(prompt("Número:"))
        let f = 1

        do{
        f *= n
        n--
        }while (n > 1)

        console.log(f)

    </script>
    
</body>
</html>

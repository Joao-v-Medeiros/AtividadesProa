<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício de logica</title>
</head>
<body>

    <h1>Faça um programa que leia 5 números inteiros e exiba a média aritmética dos valores lidos.</h1>

    <script>

        let soma = 0

        for (let i = 0; i < 5; i++){
        let n = Number(prompt("Número:"))
        soma += n
        }

        console.log(soma / 5)

    </script>
    
</body>
</html>

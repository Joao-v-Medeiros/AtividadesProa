<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício de logica</title>
</head>
<body>

    <h1>Faça um programa que leia um número inteiro e exiba se ele é um número primo usando o loop "do-while".</h1>

    <script>

        let n = Number(prompt("Número:"))
        let i = 2, primo = true

        do{
        if (n % i == 0 && i < n) primo = false
        i++
        }while (i < n)

        console.log(primo)

    </script>
    
</body>
</html>

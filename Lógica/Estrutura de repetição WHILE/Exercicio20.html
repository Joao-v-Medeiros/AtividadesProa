<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício de logica</title>
</head>
<body>

    <h1>Escreva um programa que leia um número inteiro e exiba a tabuada desse número até o décimo valor usando o loop "do-while".</h1>

    <script>

        let n = Number(prompt("Número:"))
        let i = 1

        do{
        console.log(n * i)
        i++
        }while (i <= 10)

    </script>
    
</body>
</html>

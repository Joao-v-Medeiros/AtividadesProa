<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício de logica</title>
</head>
<body>

    <h1>Crie um programa que leia o nome e a idade de 5 pessoas usando o loop "do-while" e exiba a média das idades.</h1>

    <script>

        let i = 0, soma = 0

        do{
        let nome = prompt("Nome:")
        let idade = Number(prompt("Idade:"))
        soma += idade
        i++
        }while (i < 5)

        console.log(soma / 5)
        
    </script>
    
</body>
</html>

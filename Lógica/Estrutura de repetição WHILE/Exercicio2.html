<body>

    <h1>2) Escreva um programa que calcule a soma dos números de 1 a 100 usando o loop "while". </h1>

    <script>

        let soma = 0
        let i = 0

        while( i <=100 ){
            soma = soma + i
            i++
        }

        document.write(` A soma dos números de 1 a 100 é: ${soma} `)

    </script>
    
</body>
</html>

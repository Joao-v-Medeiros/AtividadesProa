<body>

    <h1>4) Faça um programa que leia 5 números inteiros usando o loop "while" e exiba a média aritmética dos valores lidos. </h1>

    <script>

        let i = 1;
        let soma = 0;

        while( i <=5){
            let num = parseInt(prompt("Digite um número"));
            soma += num;
            i++;
        }
            let media = soma / 5;

            document.write(` A média aritimética dos números é: ${media} `)

    </script>
    
</body>
</html>

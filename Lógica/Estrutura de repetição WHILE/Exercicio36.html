    <title>Exercício de logica</title>

<body>

    <h1>Crie um programa que leia um número inteiro positivo e exiba todos os divisores desse número.</h1>

    <script>

        let n = Number(prompt("Número:"))

        for (let i = 1; i <= n; i++){
        if (n % i == 0) console.log(i)
        }

    </script>
    
</body>

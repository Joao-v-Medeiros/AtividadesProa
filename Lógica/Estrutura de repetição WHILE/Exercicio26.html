<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício de logica</title>
</head>
<body>
    
    <h1>Escreva um programa que leia um número inteiro e exiba a soma de todos os números pares entre 1 e o número lido usando <br>
        o loop "do-while".</h1>

    <script>

        let n = Number(prompt("Número:"))
        let i = 1, soma = 0

        do{
        if (i % 2 == 0) soma += i
        i++
        }while (i <= n)

        console.log(soma)

    </script>
    
</body>
</html>

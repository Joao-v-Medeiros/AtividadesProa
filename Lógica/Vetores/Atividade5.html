<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let num = [];

      for (let i = 0; i < 5; i++) {
        let valor = Number(prompt("Digite um número: "));
        num.push(valor);
      }

      let maior = num[0];
      let menor = num[0];

      for (let i = 0; i < num.length; i++) {
        if (num[i] > maior) {
          maior = num[i];
        }
        else {
          menor = num[i];
        }
      }

      document.write(maior)
      document.write("<br>" + menor)


    </script>
  </body>
</html>

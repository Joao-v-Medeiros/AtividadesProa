<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>

        let num = [];
        let soma = 0

        for (let i = 0; i < 7; i++){
            let valor = Number(prompt('Digite um número: '));
            num.push(valor);
            soma += valor;
        }

        let media = soma / 7

        console.log("media: " + media)

    </script>
    
</body>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>

        let num = []
        let positivo = 0
        let negativo = 0

        for (let i = 0; i < 10 ; i++){
            let valor = Number(prompt('Digite um número:'));
            num.push(valor);

            if(valor > 0){
               positivo += valor
            }else if (valor < 0){
                negativo += valor
            }
        }

        alert("Soma Positivo: " + positivo + "\nSoma negativo: " + negativo);

    </script>
    
</body>
</html>

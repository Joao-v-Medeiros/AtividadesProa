<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    

    <script>
        let num = [];

        for (let i = 0; i < 10 ; i++){
            let valor = Number(prompt('Digite um número:'));
            num.push(valor);
        }
        num.sort((a, b) => b - a);
        console.log(num);

    </script>

</body>
</html>

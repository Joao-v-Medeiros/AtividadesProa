<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>

        let nuPares = 0;

        for (let i = 0; i < 5; i++) {
        let valor = parseInt(prompt("Digite o número:"));

        if (valor % 2 === 0) {
            nuPares++;
        }
        }

        document.write("Quantidade de números pares: " + nuPares);

    </script>
    
</body>
</html>

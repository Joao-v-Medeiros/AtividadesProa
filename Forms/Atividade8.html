<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade8</title>
</head>
<body>
    
    <script>
        let n = parseFloat(prompt("Digite um valor maior que 0 "))

        if(n > 0) {
            for (let i = 1; i<=n; i++){
                document.write(i + "<br>")
            }
        } else {
            alert("Digite um numero valido maior que")
        }

    </script>

</body>
</html>

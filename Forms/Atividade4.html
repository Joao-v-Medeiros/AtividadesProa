<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1>Atividade4</h1>

    <script>
        let soma = 0;
        let quantidade = 85;

        for (let i = 15; i <= 100; i++ ) {
            soma += i;
        }

        let media = soma / quantidade;  
        document.write("A média aritmética dos números 15 entre 100 é: " + media.toFixed(2),)

    </script>
    
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Atividade 1</h1>

    <script>
        let num1 = parseFloat(prompt("Valor 1: "))
        let num2 = parseFloat(prompt("Valor 2: "))

       while(num2<=0){
            alert("Valor invalido")
            num2 = parseFloat(prompt("Valor 2: "))
       }

       let divisao = num1 / num2 

       document.write("Divisão dos valores é: " + divisao)


    </script>

</body>
</html>
